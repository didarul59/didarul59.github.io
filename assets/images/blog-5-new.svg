<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gpu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76b900;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#5a8c00;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#76b900;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#76b900;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#76b900" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>
  
  <!-- GPU Chip -->
  <rect x="280" y="120" width="240" height="160" rx="12" fill="#1a1a1a" stroke="url(#gpu)" stroke-width="3"/>
  <rect x="310" y="150" width="180" height="100" rx="6" fill="url(#gpu)" opacity="0.8"/>
  
  <!-- GPU Cores -->
  <g opacity="0.9">
    <rect x="325" y="165" width="25" height="25" rx="3" fill="#0a0a0f"/>
    <rect x="360" y="165" width="25" height="25" rx="3" fill="#0a0a0f"/>
    <rect x="395" y="165" width="25" height="25" rx="3" fill="#0a0a0f"/>
    <rect x="430" y="165" width="25" height="25" rx="3" fill="#0a0a0f"/>
    <rect x="465" y="165" width="25" height="25" rx="3" fill="#0a0a0f"/>
    
    <rect x="325" y="200" width="25" height="25" rx="3" fill="#0a0a0f"/>
    <rect x="360" y="200" width="25" height="25" rx="3" fill="#0a0a0f"/>
    <rect x="395" y="200" width="25" height="25" rx="3" fill="#0a0a0f"/>
    <rect x="430" y="200" width="25" height="25" rx="3" fill="#0a0a0f"/>
    <rect x="465" y="200" width="25" height="25" rx="3" fill="#0a0a0f"/>
  </g>
  
  <!-- Connection lines -->
  <g opacity="0.3" stroke="#76b900" stroke-width="1">
    <line x1="337" y1="190" x2="337" y2="200"/>
    <line x1="372" y1="190" x2="372" y2="200"/>
    <line x1="407" y1="190" x2="407" y2="200"/>
    <line x1="442" y1="190" x2="442" y2="200"/>
    <line x1="477" y1="190" x2="477" y2="200"/>
  </g>
  
  <!-- Glow effect -->
  <rect x="280" y="120" width="240" height="160" rx="12" fill="url(#glow)" filter="url(#blur)"/>
  
  <!-- QE Text -->
  <text x="400" y="340" text-anchor="middle" font-family="monospace" font-size="28" fill="#76b900" font-weight="bold">Quantum ESPRESSO + CUDA</text>
  
  <!-- Particle dots -->
  <circle cx="150" cy="100" r="4" fill="#76b900" opacity="0.6"/>
  <circle cx="200" cy="250" r="3" fill="#76b900" opacity="0.4"/>
  <circle cx="650" cy="150" r="5" fill="#76b900" opacity="0.5"/>
  <circle cx="700" cy="300" r="3" fill="#76b900" opacity="0.7"/>
  <circle cx="100" cy="320" r="4" fill="#76b900" opacity="0.3"/>
  <circle cx="750" cy="200" r="4" fill="#76b900" opacity="0.6"/>
</svg>
